<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Livres à acheter</title>
  <style>
     :root {
  --bg: transparent;
  --fg: #0a0f13;
  --li-bg: transparent; /* <--- important */
  --li-fg: #0a0f13;
  --a-fg: #0a0f13;
}

    @media (prefers-color-scheme: dark) {
  :root {
    --bg: transparent;
    --fg: #ffffff;
    --li-bg: transparent;
    --li-fg: #ffffff;
    --a-fg: #ffffff;
  }
}

:root[data-theme="light"] {
  --bg: transparent;
  --fg: #0a0f13;
  --li-bg: transparent;
  --li-fg: #0a0f13;
  --a-fg: #0a0f13;
}

:root[data-theme="dark"] {
  --bg: transparent;
  --fg: #ffffff;
  --li-bg: transparent;
  --li-fg: #ffffff;
  --a-fg: #ffffff;
}

    /* 🌈 Styles */
    html, body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      margin: 0px;
      background: transparent !important;
      color: var(--fg);
    }

    h2 {
      color: var(--fg);
    }

    ul {
      list-style-type: none;
      padding-left: 0px;
      margin: 0;
    }

    li {
      padding: 10px;
      border-radius: 8px;
      margin: 4px 0;
      background: var(--li-bg);
      color: var(--li-fg);
      display: flex;
      align-items: center;
    }

    a {
      text-decoration: none;
      color: var(--a-fg);
      font-weight: 400;
    }

    img {
      width: 50px;
      height: auto;
      margin-right: 12px;
      border-radius: 8px;
    }

    p {
      font-size: 0.8rem;
      color: #666;
    }
  </style>
</head>
<body>
  <ul>
    <li><img src="https://m.media-amazon.com/images/I/61OlGEW381L._SY466_.jpg" alt="Couverture du livre" /><a href="https://www.amazon.fr/dp/B0GJWGRSFC">31 Jours avec TEGO: Petits pas, Grands changements</a></li>
  </ul>
  <p style="font-size:0.8rem;color:#666">Dernière mise à jour : avril 2026</p>

  <script>
    // Appelée depuis MAUI pour changer le thème avec les couleurs dynamiques
    window.setTheme = function(theme, colors) {
      if (theme === 'light' || theme === 'dark') {
        document.documentElement.setAttribute('data-theme', theme);
        
        // Si les couleurs sont fournies, les appliquer
        if (colors) {
          if (colors.textColor) {
            document.documentElement.style.setProperty('--fg', colors.textColor);
            document.documentElement.style.setProperty('--li-fg', colors.textColor);
            document.documentElement.style.setProperty('--a-fg', colors.textColor);
          }
          if (colors.backgroundColor) {
            document.documentElement.style.setProperty('--bg', colors.backgroundColor);
            document.documentElement.style.setProperty('--li-bg', colors.backgroundColor);
          }
        }
      } else {
        document.documentElement.removeAttribute('data-theme'); // redevient media query
      }
    };
  </script>
</body>
</html>
